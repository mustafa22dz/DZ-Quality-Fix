<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ-Quality-Fix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: system-ui;
  background:#0b0f19;
  color:#fff;
}

.container{
  width:90%;
  max-width:1100px;
  margin:auto;
}

section{padding:70px 0}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
}

h1{font-size:2.5rem;margin-bottom:15px}
p{color:#9aa6c2;margin-bottom:20px}

/* زر */
.btn{
  padding:12px 20px;
  border-radius:10px;
  background:#00d2ff;
  color:#000;
  text-decoration:none;
  display:inline-block;
}

/* رفع الصورة */
.upload-box{
  text-align:center;
  margin-bottom:15px;
}

/* السلايدر */
.comparison-wrapper{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  border-radius:15px;
  background:#000;
}

.comparison-wrapper img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.after-layer{
  width:50%;
  overflow:hidden;
  position:absolute;
  inset:0;
  transition:all 0.1s linear;
}

.slider-line{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#fff;
  left:50%;
  transform:translateX(-50%);
}

.slider-handle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:grid;
  place-items:center;
  font-weight:bold;
  cursor:grab;
}

.label{
  position:absolute;
  top:10px;
  background:rgba(0,0,0,.6);
  padding:5px 10px;
  border-radius:10px;
}

.before{right:10px}
.after{left:10px}

/* لودينغ */
.loading{
  text-align:center;
  margin-top:10px;
  display:none;
  color:#00d2ff;
}

@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<section>
<div class="container hero-grid">

<div>
<h1>حسّن صورك بالذكاء الاصطناعي</h1>
<p>ارفع الصورة وشاهد الفرق فوراً</p>
</div>

<div>

<div class="upload-box">
  <input type="file" id="upload" accept="image/*">
  <div class="loading" id="loading">⏳ جاري تحسين الصورة...</div>
</div>

<div class="comparison-wrapper" id="comparison">

<img id="beforeImg">

<div class="after-layer" id="afterLayer">
  <img id="afterImg">
</div>

<div class="label before">قبل</div>
<div class="label after">بعد</div>

<div class="slider-line" id="sliderLine"></div>
<div class="slider-handle" id="sliderHandle">↔</div>

</div>

</div>

</div>
</section>

<script>
const input = document.getElementById("upload");
const beforeImg = document.getElementById("beforeImg");
const afterImg = document.getElementById("afterImg");
const loading = document.getElementById("loading");

const comparison = document.getElementById("comparison");
const afterLayer = document.getElementById("afterLayer");
const sliderLine = document.getElementById("sliderLine");
const sliderHandle = document.getElementById("sliderHandle");

input.addEventListener("change", async () => {
  const file = input.files[0];
  if(!file) return;

  // عرض الصورة الأصلية
  const reader = new FileReader();
  reader.onload = () => {
    beforeImg.src = reader.result;
  };
  reader.readAsDataURL(file);

  loading.style.display = "block";

  try{
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "upload_images"); // غيرها

    const res = await fetch("https://api.cloudinary.com/v1_1/duby6pthu/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if(!data.secure_url){
      alert("خطأ في Cloudinary");
      loading.style.display = "none";
      return;
    }

    const optimized = data.secure_url.replace("/upload/", "/upload/e_upscale,q_auto/");

    afterImg.src = optimized;

  }catch(err){
    alert("فشل الاتصال بالإنترنت");
  }

  loading.style.display = "none";
});

/* السلايدر */
let isDragging = false;

function updateSlider(x){
  const rect = comparison.getBoundingClientRect();
  let pos = ((x - rect.left)/rect.width)*100;
  pos = Math.max(0, Math.min(100,pos));

  afterLayer.style.width = pos + "%";
  sliderLine.style.left = pos + "%";
  sliderHandle.style.left = pos + "%";
}

comparison.addEventListener("mousedown", ()=> isDragging=true);
window.addEventListener("mouseup", ()=> isDragging=false);

window.addEventListener("mousemove", e=>{
  if(!isDragging) return;
  updateSlider(e.clientX);
});

comparison.addEventListener("touchstart", e=>{
  isDragging=true;
  updateSlider(e.touches[0].clientX);
});

window.addEventListener("touchend", ()=> isDragging=false);

window.addEventListener("touchmove", e=>{
  if(!isDragging) return;
  updateSlider(e.touches[0].clientX);
});
</script>

</body>
</html>
