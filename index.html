<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DZ-Quality-Fix | تحسين الصور بالذكاء الاصطناعي</title>
  <style>
    /* التنسيقات الأساسية المستوحاة من تصميمك الاحترافي */
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b0f19;
      --card:#121826;
      --primary:#00d2ff;
      --primary2:#3a7bd5;
      --muted:#9aa6c2;
    }
    body{
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: #fff;
      line-height: 1.6;
    }
    .container{ width: min(1100px, 92%); margin: auto; }
    section{ padding: 80px 0; }

    /* الهيرو سكشن */
    .hero-grid{
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 50px;
      align-items: center;
    }
    h1{ font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 20px; line-height: 1.2; }
    .highlight{ color: var(--primary); }
    p{ color: var(--muted); font-size: 1.1rem; margin-bottom: 30px; }

    /* صندوق المقارنة والتحسين */
    .card-box{
      background: var(--card);
      padding: 25px;
      border-radius: 30px;
      border: 1px solid #25304a;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .upload-area{
      margin-bottom: 20px;
      padding: 20px;
      border: 2px dashed #25304a;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
    }
    .upload-area:hover{ border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
    input[type="file"]{ cursor: pointer; color: var(--primary); }

    /* السلايدر الاحترافي */
    .comparison-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      display: none; /* يظهر فقط بعد رفع الصورة */
    }
    .image-before, .image-after {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    .image-after-container {
      position: absolute;
      top: 0; left: 0; width: 50%; height: 100%;
      overflow: hidden;
      border-right: 3px solid #fff;
      z-index: 2;
    }
    .slider-handle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 45px; height: 45px;
      background: #fff;
      border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 3;
      cursor: ew-resize;
      color: #000; font-weight: bold;
    }
    .label {
      position: absolute; top: 15px; z-index: 4;
      padding: 5px 15px; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px); border-radius: 20px; font-size: 0.8rem;
    }
    .label-before { right: 15px; }
    .label-after { left: 15px; }

    /* لودينغ */
    .loader {
      display: none;
      text-align: center; margin: 15px 0;
      color: var(--primary); font-weight: bold;
    }

    @media (max-width: 900px){
      .hero-grid{ grid-template-columns: 1fr; text-align: center; }
      section{ padding: 40px 0; }
    }
  </style>
</head>
<body>

  <section>
    <div class="container hero-grid">
      <div>
        <h1>حوّل صورك إلى <span class="highlight">دقة 4K</span> مجاناً</h1>
        <p>ارفع صورتك الآن وشاهد السحر! نقوم بتحسين الملامح وإصلاح البكسلات المفقودة باستخدام أحدث تقنيات الـ AI.</p>
        <div class="trust-note" style="font-size: 0.8rem; color: #aecdff;">🛡️ خصوصيتك مضمونة، الصور تحذف تلقائياً.</div>
      </div>

      <div class="card-box">
        <div class="upload-area">
          <input type="file" id="imageInput" accept="image/*">
          <p style="margin: 10px 0 0; font-size: 0.9rem;">اضغط هنا لاختيار صورة من جهازك</p>
        </div>

        <div class="loader" id="loader">✨ جاري التحسين بالذكاء الاصطناعي...</div>

        <div class="comparison-container" id="container">
          <img id="beforeImg" class="image-before">
          
          <div class="image-after-container" id="afterWrapper">
            <img id="afterImg" class="image-after">
          </div>

          <div class="label label-before">قبل</div>
          <div class="label label-after">بعد</div>
          <div class="slider-handle" id="handle">↔</div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const input = document.getElementById('imageInput');
    const container = document.getElementById('container');
    const beforeImg = document.getElementById('beforeImg');
    const afterImg = document.getElementById('afterImg');
    const loader = document.getElementById('loader');
    const afterWrapper = document.getElementById('afterWrapper');
    const handle = document.getElementById('handle');

    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      // إظهار الصورة الأصلية فوراً
      const url = URL.createObjectURL(file);
      beforeImg.src = url;
      container.style.display = "block";
      loader.style.display = "block";

      // محاكاة عملية التحسين (بما أن الربط مع Cloudinary يحتاج إعدادات حسابك)
      // ملاحظة: يمكنك وضع كود الـ Fetch الخاص بـ Cloudinary هنا كما فعلت سابقاً
      setTimeout(() => {
        afterImg.src = url; // مؤقتاً نعرض نفس الصورة
        afterImg.style.filter = "contrast(1.2) brightness(1.1) saturate(1.1) sharp(10px)"; // تأثير بصري بسيط
        loader.style.display = "none";
      }, 2000);
    });

    // منطق السلايدر
    let dragging = false;
    const move = (e) => {
      if(!dragging) return;
      let x = e.pageX || e.touches[0].pageX;
      let rect = container.getBoundingClientRect();
      let pos = ((x - rect.left) / rect.width) * 100;
      pos = Math.max(0, Math.min(100, pos));
      afterWrapper.style.width = pos + "%";
      handle.style.left = pos + "%";
    };

    handle.addEventListener('mousedown', () => dragging = true);
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', move);
    handle.addEventListener('touchstart', () => dragging = true);
    window.addEventListener('touchend', () => dragging = false);
    window.addEventListener('touchmove', move);

  </script>
</body>
</html>
